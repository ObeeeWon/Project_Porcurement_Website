<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARPS | IT Clearance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-navy { background-color: #003366; }
        .modal-mask { background: rgba(0, 51, 102, 0.2); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="border-b-4 border-[#003366] sticky top-0 bg-white/95 backdrop-blur-sm z-50 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex flex-col cursor-pointer" onclick="location.reload()">
                <span style="font-family: 'Montserrat', sans-serif;" class="text-2xl font-black text-[#003366] leading-none tracking-tighter uppercase">Applied Research Procurement System</span>
                <span class="text-xs font-bold text-gray-400 mt-1 tracking-widest uppercase text-left">Sydney Waterfront Campus</span>
            </div>
            <div class="flex gap-4">
                <span class="text-[#003366] font-black text-sm tracking-widest uppercase border-2 border-[#003366] px-4 py-2">Portal: Manager</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-black text-navy mb-10 uppercase italic underline decoration-8 decoration-blue-100">IT Audit Queue</h1>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] font-black uppercase text-gray-400 border-b">
                    <tr>
                        <th class="p-6">Submission Ref</th>
                        <th class="p-6">Project Code</th>
                        <th class="p-6 text-center">Current Phase</th>
                        <th class="p-6 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="it-table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="it-modal" class="fixed inset-0 z-[200] hidden modal-mask">
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-2xl bg-white shadow-2xl p-12 overflow-hidden flex flex-col">
            <div class="flex justify-between items-start mb-6" id="modal-header-info"></div>
            <div id="modal-axis-container" class="mb-10 px-6"></div>
            <div class="flex-1 overflow-y-auto pr-4 text-left" id="modal-main-content"></div>
            <div id="modal-footer-actions" class="mt-8 pt-8 border-t grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let submissions = JSON.parse(localStorage.getItem('arps_records')) || [];
        const steps = ['Reviewing', 'Approved', 'Pending IT', 'IT Approved', 'Finalized'];

        function renderITTable() {
            const body = document.getElementById('it-table-body');
            const itTasks = submissions.filter(r => r.status === 'Pending IT');
            body.innerHTML = itTasks.map((r) => {
                const globalIdx = submissions.findIndex(s => s.id === r.id);
                return `
                    <tr class="border-b hover:bg-blue-50 transition">
                        <td class="p-6 font-black text-navy">${r.id}</td>
                        <td class="p-6 font-bold text-gray-500 uppercase">${r.budgetCode || 'N/A'}</td>
                        <td class="p-6 text-center"><span class="px-3 py-1 bg-blue-50 text-blue-600 text-[9px] font-black uppercase italic">Finance Initiated Review</span></td>
                        <td class="p-6 text-right"><button onclick="openITModal(${globalIdx})" class="bg-blue-600 text-white px-6 py-2 rounded-sm font-black text-[10px] uppercase">Review Spec</button></td>
                    </tr>`;
            }).join('');
        }

        function openITModal(idx) {
            const r = submissions[idx];
            const currentStepIdx = steps.indexOf(r.status);
            const progressWidth = (currentStepIdx / (steps.length - 1)) * 100;

            document.getElementById('modal-header-info').innerHTML = `<h2 class="text-4xl font-black text-blue-600 italic uppercase">${r.id}</h2><button onclick="closeModal()" class="text-3xl text-gray-200 hover:text-blue-600">&times;</button>`;
            
            document.getElementById('modal-axis-container').innerHTML = `
                <div class="relative pt-6">
                    <div class="absolute top-[34px] left-0 right-0 h-0.5 bg-gray-100"></div>
                    <div class="absolute top-[34px] left-0 h-0.5 bg-blue-600 transition-all duration-1000" style="width: ${progressWidth}%"></div>
                    <div class="flex justify-between relative z-10">
                        ${steps.map((s, i) => `<div class="flex flex-col items-center"><div class="w-4 h-4 rounded-full ${i <= currentStepIdx ? 'bg-blue-600 shadow-lg' : 'bg-white border-2 border-gray-100'} mb-2"></div><span class="text-[7px] font-black uppercase tracking-tighter ${i <= currentStepIdx ? 'text-blue-600' : 'text-gray-300'}">${s}</span></div>`).join('')}
                    </div>
                </div>`;

            document.getElementById('modal-main-content').innerHTML = `
                <div class="mb-8 p-6 bg-blue-600 text-white rounded-xl shadow-xl flex justify-between items-center">
                    <div><p class="text-[8px] opacity-60 uppercase mb-1 italic">Project Code</p><p class="text-2xl font-black tracking-widest">${r.budgetCode || 'N/A'}</p></div>
                    <div class="text-right font-black text-2xl">${r.total}</div>
                </div>
                <div class="space-y-6 text-left">
                    ${r.items.map(item => `
                        <div class="py-4 border-b border-gray-100">
                            <p class="font-black text-navy uppercase text-sm">${item.name}</p>
                            <div class="flex gap-4 mt-1 items-center">
                                <p class="text-[10px] text-gray-400 italic">${item.vendor} | Qty: ${item.qty}</p>
                                ${item.link ? `<a href="${item.link}" target="_blank" class="text-[10px] text-blue-600 font-black uppercase underline italic">Verify Technical Spec ↗</a>` : ''}
                            </div>
                        </div>`).join('')}
                </div>`;

            document.getElementById('modal-footer-actions').innerHTML = `
                <button onclick="itUpdate(${idx}, 'Rejected')" class="py-4 border-2 border-red-500 text-red-500 font-black uppercase text-xs">Reject Tech</button>
                <button onclick="itUpdate(${idx}, 'IT Approved')" class="py-4 bg-blue-600 text-white font-black uppercase text-xs">Clear for Final Finance</button>`;
            document.getElementById('it-modal').classList.remove('hidden');
        }

        function itUpdate(idx, status) {
            submissions[idx].status = status;
            submissions[idx].logs.push({time: new Date().toLocaleString(), user: 'IT', action: status});
            localStorage.setItem('arps_records', JSON.stringify(submissions));
            renderITTable(); closeModal();
        }

        function closeModal() { document.getElementById('it-modal').classList.add('hidden'); }
        renderITTable();
    </script>
</body>
</html>
